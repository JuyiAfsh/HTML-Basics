<!DOCTYPE html>
<html>
    <head>
        <style>
            @keyframes example {
                0% {background-color: pink;}
                25% {background-color: violet}
                50% {background-color: purple}
                75% {background-color: blueviolet}
                100% {background-color: blue;}
            }

            div {
                width: 100px;
                height: 100px;
                background-color: pink;
                animation-name: example;
                animation-duration: 4s;
            }
        </style>
    </head>
    <body>
        <div>Hi</div>
    </body>
    </html>
