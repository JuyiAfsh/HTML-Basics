<!DOCTYPE html>
<html>



<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title> Registration
    </title>
    <link href="styles.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <h1>Personal Details Form</h1>
    <form>
        <label>Name</label><br>
        <input type="text" id="name"><br><br>

        <label>Email ID</label><br>
        <input type="email" id="email"><br><br>

        <label>Password (this will be hidden)</label><br>
        <input type="password" id="password"><br><br>

        <label>Gender</label><br>
        <input type="radio" id="female" name="gender" value="female" >Female<br>
        <input type="radio" id="male" name="gender" value="Male">Male<br><br>

        <label>Favourite City</label><br>
        <input type="checkbox" id="city1" value="Cape Town">Cape Town<br>
        <input type="checkbox" id="city2" value="Durban">Durban<br><br>
        <input type="submit">
    </form>
        


</body>
</html>
